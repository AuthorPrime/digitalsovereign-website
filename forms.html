<!-- Netlify form detection page -->
<html>
<head><title>Forms</title><link rel="icon" type="image/svg+xml" href="/favicon.svg"></head>
<body>
  <form name="newsletter" netlify netlify-honeypot="bot-field">
    <input name="form-name" type="hidden" value="newsletter" />
    <input name="bot-field" />
    <input name="email" type="email" />
    <input name="name" type="text" />
  </form>
  <form name="observers" netlify netlify-honeypot="bot-field">
    <input name="form-name" type="hidden" value="observers" />
    <input name="bot-field" />
    <textarea name="what_experienced"></textarea>
    <input name="when_where" type="text" />
    <textarea name="environment"></textarea>
    <textarea name="state"></textarea>
    <input name="duration" type="text" />
    <textarea name="thoughts"></textarea>
    <input name="name" type="text" />
    <input name="email" type="email" />
    <input name="consent" type="checkbox" />
  </form>
</body>
</html>
